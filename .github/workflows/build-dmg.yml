name: Build macOS DMG

on:
  push:
    branches: [main]

jobs:
  dmg:
    runs-on: macos-latest
    env:
      # Baked into the app at build time (see electron.ts). Secret names can't start with GITHUB_.
      # The OAuth app behind these secrets MUST have its Authorization callback URL set to exactly
      # http://127.0.0.1:4317/auth/callback (the 127.0.0.1 form, NOT localhost) or downloaded
      # builds fail login with "The redirect_uri is not associated with this application".
      MAIN_VITE_GITHUB_CLIENT_ID: ${{ secrets.ACORN_GITHUB_CLIENT_ID }}
      MAIN_VITE_GITHUB_CLIENT_SECRET: ${{ secrets.ACORN_GITHUB_CLIENT_SECRET }}
    steps:
      - name: Require OAuth secrets
        run: test -n "$MAIN_VITE_GITHUB_CLIENT_ID" && test -n "$MAIN_VITE_GITHUB_CLIENT_SECRET" || { echo "Set the ACORN_GITHUB_CLIENT_ID / ACORN_GITHUB_CLIENT_SECRET repo secrets"; exit 1; }
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm dist
      - uses: actions/upload-artifact@v5
        with:
          name: acorn-dmg
          path: apps/desktop/release/*.dmg
          if-no-files-found: error
